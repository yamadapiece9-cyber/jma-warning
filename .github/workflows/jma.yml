name: JMA Warning Check

on:
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'   # 毎時 :03 :13 :23 :33 :43 :53（0分の混雑スロットを回避）
  workflow_dispatch:            # 手動実行ボタンも有効化

permissions:
  contents: write               # state.json を commit するために必要

concurrency:
  group: jma-warning
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # 手動実行(Run workflow)のときだけ現況を強制投稿
          FORCE_POST: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python jma_check.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push
